<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CompetitorAnalysisStratOS</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Aplikacja do określania konkurencji</h1>
    <p>Wpisz NIP, aby pobrać podstawowe dane organizacji z rejestr.io (w tym informację o KRD, jeśli dostępna).</p>

    <section class="form">
      <button id="openai-connection-test-btn" type="button">Test połączenia OpenAI</button>
      <p id="openai-connection-result" class="message" aria-live="polite">Brak testu połączenia OpenAI.</p>
    </section>

    <form id="company-form" class="form">
      <label for="nip">NIP</label>
      <input id="nip" name="nip" type="text" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" required />
      <button type="submit">Pobierz dane</button>
    </form>

    <p id="message" class="message" aria-live="polite"></p>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>NIP</th>
          <th>Nazwa organizacji</th>
          <th>Status</th>
          <th>Przeważająca działalność</th>
          <th>Miasto</th>
          <th>Adres</th>
          <th>KRD</th>
        </tr>
      </thead>
      <tbody id="companies-table-body"></tbody>
    </table>

    <h2>Debug request/response</h2>
    <pre id="debug-output">Brak danych debug.</pre>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
