<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CompetitorAnalysisStratOS</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Aplikacja do określania konkurencji</h1>
    <p>Wpisz NIP, aby zapisać firmę do analizy konkurencyjnej.</p>

    <form id="company-form" class="form">
      <label for="nip">NIP</label>
      <input id="nip" name="nip" type="text" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" required />
      <button type="submit">Zapisz</button>
    </form>

    <p id="message" class="message" aria-live="polite"></p>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>NIP</th>
        </tr>
      </thead>
      <tbody id="companies-table-body"></tbody>
    </table>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
